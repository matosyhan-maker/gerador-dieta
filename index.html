<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diet Generator</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 20px; }
        h1 { color: #333; }
        form { background: #fff; padding: 20px; border-radius: 5px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        label { display: block; margin-bottom: 10px; }
        input[type="text"], input[type="number"] { width: 100%; padding: 10px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 3px; }
        button { background: #5cb85c; color: white; padding: 10px; border: none; border-radius: 3px; cursor: pointer; }
        button:hover { background: #4cae4c; }
    </style>
</head>
<body>
    <h1>Diet Generator</h1>
    <form id="dietForm">
        <label for="calories">Calories:</label>
        <input type="number" id="calories" name="calories" required />

        <label for="protein">Protein (g):</label>
        <input type="number" id="protein" name="protein" required />

        <label for="carbs">Carbs (g):</label>
        <input type="number" id="carbs" name="carbs" required />

        <label for="fat">Fat (g):</label>
        <input type="number" id="fat" name="fat" required />

        <button type="submit">Generate Diet</button>
    </form>

    <div id="dietResults"></div>

    <script>
        document.getElementById('dietForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const calories = parseFloat(document.getElementById('calories').value);
            const protein = parseFloat(document.getElementById('protein').value);
            const carbs = parseFloat(document.getElementById('carbs').value);
            const fat = parseFloat(document.getElementById('fat').value);

            const proteinCalories = protein * 4;
            const carbsCalories = carbs * 4;
            const fatCalories = fat * 9;
            const totalCalories = proteinCalories + carbsCalories + fatCalories;

            if (totalCalories !== calories) {
                alert('The total calories do not match the macronutrient breakdown!');
                return;
            }

            document.getElementById('dietResults').innerHTML = `<h2>Your Diet Plan</h2><p>Protein: ${protein}g (${proteinCalories} cal)</p><p>Carbs: ${carbs}g (${carbsCalories} cal)</p><p>Fat: ${fat}g (${fatCalories} cal)</p>`;
        });
    </script>
</body>
</html>
